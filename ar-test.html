<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 WebAR実験室</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        .info-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 999;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="info-overlay">
        <h3>✨ WebAR テスト画面</h3>
        <p>スマホのカメラ許可を出したあと、<br>「HIRO」マーカーにかざしてください。</p>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker preset="hiro">
            
            <a-box position="0 0.5 0" material="color: #28a745; opacity: 0.8;" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"></a-box>
            
            <a-text value="C-3-02-1 TARGET" position="-0.7 1.2 0" color="#ffffff" width="4" align="center" font="k領" background-color="#000000"></a-text>

        </a-marker>

        <a-entity camera></a-entity>
        
    </a-scene>

</body>
</html>
