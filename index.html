<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倉庫棚番検索システム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .search-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            text-align: center;
        }
        .input-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-bottom: 15px;
        }
        input {
            padding: 12px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }
        /* 入力ボックスごとの横幅調整 */
        .box-1 { width: 50px; text-transform: uppercase; } /* アルファベット */
        .box-2 { width: 50px; }
        .box-3 { width: 60px; }
        .box-4 { width: 60px; } /* 4つ目（空欄でもOK） */

        .hyphen {
            font-size: 20px;
            font-weight: bold;
            color: #666;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            max-width: 200px;
        }
        button:hover {
            background-color: #218838;
        }
        .result-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            margin-top: 10px;
        }
        .overall-container {
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .overall-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>📦 倉庫棚番検索システム</h1>

    <div class="overall-container">
        <div class="overall-title">【 全体案内図 】</div>
        <img src="overall.png" alt="全体案内図" onerror="this.style.display='none';">
    </div>

    <div class="search-container">
        <p style="margin-top:0; color:#555; font-size:14px;">棚番を分けて入力してください</p>
        <div class="input-group">
            <input type="text" id="val1" class="box-1" placeholder="C" maxlength="2" autofocus>
            <span class="hyphen">-</span>
            <input type="text" id="val2" class="box-2" placeholder="3" maxlength="3">
            <span class="hyphen">-</span>
            <input type="text" id="val3" class="box-3" placeholder="02" maxlength="3">
            <span class="hyphen">-</span>
            <input type="text" id="val4" class="box-4" placeholder="1" maxlength="3">
        </div>
        <button onclick="searchShelf()">検索する</button>
    </div>

    <div class="result-container" id="resultContainer" style="display: none;">
        <h2 id="resultTitle" style="color: #333; font-size: 18px;"></h2>
        <img id="shelfImage" src="" alt="棚の位置画像">
    </div>

    <script>
        // 次の入力ボックスへ自動で移動するおまけ機能
        setupAutoMove('val1', 'val2');
        setupAutoMove('val2', 'val3');
        setupAutoMove('val3', 'val4');

        function setupAutoMove(currentId, nextId) {
            document.getElementById(currentId).addEventListener('input', function() {
                if (this.value.length >= this.maxLength) {
                    document.getElementById(nextId).focus();
                }
            });
        }

        function searchShelf() {
            var v1 = document.getElementById('val1').value.trim().toUpperCase();
            var v2 = document.getElementById('val2').value.trim();
            var v3 = document.getElementById('val3').value.trim();
            var v4 = document.getElementById('val4').value.trim();

            // 必須入力チェック（最初の3つが入っていればOK）
            if (!v1 || !v2 || !v3) {
                alert("棚番を正しく入力してください。");
                return;
            }

            // 入力された文字をハイフンで合体させる
            var shelfCode = v1 + "-" + v2 + "-" + v3;
            if (v4 !== "") {
                shelfCode += "-" + v4; // 4つ目があれば後ろに繋ぐ
            }

            // 画像のパスを作成 (images/C-3-02-1.png の形になります)
            var imagePath = "images/" + shelfCode + ".png";

            var resultContainer = document.getElementById('resultContainer');
            var resultTitle = document.getElementById('resultTitle');
            var shelfImage = document.getElementById('shelfImage');

            // 画像をセットして表示
            shelfImage.src = imagePath;
            resultTitle.innerText = "検索結果: " + shelfCode;
            resultContainer.style.display = 'block';

            // 画像が見つからなかったときのエラー処理
            shelfImage.onerror = function() {
                alert("該当する棚番の画像（" + shelfCode + ".png）が見つかりません。imagesフォルダに対象の画像があるか確認してください。");
                resultContainer.style.display = 'none';
            };
        }
    </script>
</body>
</html>
