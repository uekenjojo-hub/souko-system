<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>倉庫棚番検索システム</title>
    <style>
        /* 見た目を整えるCSSルール（あとから自由に変えられます） */
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .search-box {
            margin-bottom: 20px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 200px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .image-container {
            margin-top: 20px;
        }
        img {
            max-width: 100%;
            height: auto;
            border: 2px solid #ccc;
            background-color: white;
        }
    </style>
</head>
<body>

    <h1>倉庫棚番検索システム</h1>

    <div class="search-box">
        <input type="text" id="shelfInput" placeholder="例: C-3-20">
        <button onclick="searchShelf()">検索</button>
    </div>

    <div class="image-container">
        <img id="shelfImage" src="" alt="ここに棚の画像が表示されます" style="display: none;">
    </div>

    <script>
        // ボタンが押されたら動く魔法のプログラム
        function searchShelf() {
            // 1. 入力された文字を読み取る
            var inputValue = document.getElementById("shelfInput").value;
            
            // 何も入力されていない時は何もしない
            if (inputValue === "") {
                alert("棚番を入力してください！");
                return;
            }

            // 2. 画像のファイル名を作る (例: images/C-3-20.png)
            var imagePath = "images/" + inputValue + ".png";

            // 3. 画面の画像パーツを書き換える
            var imgElement = document.getElementById("shelfImage");
            imgElement.src = imagePath;
            imgElement.style.display = "inline-block"; // 画像を表示する
            imgElement.alt = inputValue + " の配置画像";
        }
    </script>

</body>
</html>
