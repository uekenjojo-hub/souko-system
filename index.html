<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倉庫棚番検索システム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .notice-container {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .notice-title {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .search-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            text-align: center;
        }
        .input-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-bottom: 15px;
        }
        input, textarea {
            padding: 12px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            box-sizing: border-box;
        }
        .box-1 { width: 50px; text-transform: uppercase; }
        .box-2 { width: 50px; }
        .box-3 { width: 60px; }
        .box-4 { width: 60px; } 

        .hyphen {
            font-size: 20px;
            font-weight: bold;
            color: #666;
        }
        .btn-search {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            max-width: 200px;
        }
        .btn-search:hover { background-color: #218838; }

        .management-box {
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: left;
        }
        .management-title {
            font-size: 15px;
            font-weight: bold;
            color: #495057;
            margin-bottom: 10px;
        }
        .btn-complete {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
        }
        .btn-complete:hover { background-color: #0069d9; }
        
        .memo-area {
            width: 100%;
            font-size: 15px;
            font-family: inherit;
            text-align: left;
            resize: none;
            margin-bottom: 8px;
            font-weight: normal;
        }
        .btn-memo {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 8px 15px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .btn-memo:hover { background-color: #5a6268; }

        .result-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            margin-top: 10px;
        }
        .overall-container {
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .overall-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>📦 倉庫棚番検索システム</h1>

<div class="notice-container" style="display: none;">
        <div class="notice-title">📢 倉庫整理のお知らせ</div>
        <div>本日、C棚周辺の在庫カウントを行います。整理が終わった棚は下の「整理完了」ボタンを押して記録してください。</div>
    </div>

    <div class="overall-container">
        <div class="overall-title">【 全体案内図 】</div>
        <img src="overall.png" alt="全体案内図" onerror="this.style.display='none';">
    </div>

    <div class="search-container">
        <p style="margin-top:0; color:#555; font-size:14px;">棚番を入力してEnterを押してください</p>
        <div class="input-group">
            <input type="text" id="val1" class="box-1" placeholder="C" maxlength="2" inputmode="search" autocapitalize="characters" autocomplete="off" autofocus>
            <span class="hyphen">-</span>
            <input type="text" id="val2" class="box-2" placeholder="3" maxlength="3" inputmode="numeric" pattern="[0-9]*">
            <span class="hyphen">-</span>
            <input type="text" id="val3" class="box-3" placeholder="02" maxlength="3" inputmode="numeric" pattern="[0-9]*">
            <span class="hyphen">-</span>
            <input type="text" id="val4" class="box-4" placeholder="1" maxlength="3" inputmode="numeric" pattern="[0-9]*">
        </div>
        <button class="btn-search" onclick="searchShelf()">検索する</button>
    </div>

    <div class="result-container" id="resultContainer" style="display: none;">
        <h2 id="resultTitle" style="color: #333; font-size: 18px;"></h2>
        <img id="shelfImage" src="" alt="棚の位置画像">

        <div class="management-box">
            <div class="management-title">⚙️ この棚のロケーション管理</div>
            <button class="btn-complete" onclick="submitOrder('【整理完了】点検を行いました')">この棚の整理を完了する</button>
            <textarea id="shelfMemo" class="memo-area" rows="2" placeholder="例：A商品をこの棚へ移動した、など"></textarea>
            <button class="btn-memo" onclick="submitMemo()">上記のメモを記録する</button>
        </div>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <script>
        var currentActiveShelf = "";

        setupEnterMove('val1', 'val2');
        setupEnterMove('val2', 'val3');
        setupEnterMove('val3', 'val4');

        function setupEnterMove(currentId, nextId) {
            document.getElementById(currentId).addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault(); 
                    document.getElementById(nextId).focus();
                }
            });
        }

        document.getElementById('val3').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.getElementById('val4').value.trim() === '') {
                e.preventDefault();
                searchShelf();
            }
        });

        document.getElementById('val4').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                searchShelf();
            }
        });

        function sendToGoogleForm(shelf, memoText) {
            var formId = "1FAIpQLSfVi2yyXN9zmFmWCTiL_t3y23XqNkupaB6Exi70OPlbLqb0Og";
            var shelfEntry = "entry.2085768012";  
            var memoEntry = "entry.2022800064";   
            
            var sendUrl = "https://docs.google.com/forms/d/e/" + formId + "/formResponse?" 
                        + shelfEntry + "=" + encodeURIComponent(shelf) + "&"
                        + memoEntry + "=" + encodeURIComponent(memoText);
            
            var iframe = document.getElementById('hidden_iframe');
            iframe.src = sendUrl;
        }

        // 💡 数字の前に「0」をつけて2桁にする便利な関数
        function padZero(value) {
            var str = value.trim();
            // 入力された文字が数字で、かつ1桁の場合だけ「0」を前につける
            if (str.length === 1 && !isNaN(str)) {
                return "0" + str;
            }
            return str;
        }

        function searchShelf() {
            var v1 = document.getElementById('val1').value.trim().toUpperCase();
            
            // 💡 2つ目と3つ目と4つ目の入力欄に、自動で0を補う設定を適用
            var v2 = document.getElementById('val2').value.trim(); // 3段目はそのまま(C-3)
            var v3 = padZero(document.getElementById('val3').value); // 2桁に補正(例: 2→02)
            var v4 = document.getElementById('val4').value.trim(); // 4つ目もそのまま(C-3-02-1)

            if (!v1 || !v2 || !v3) {
                alert("棚番を正しく入力してください。");
                return;
            }

            // 正しいファイル名（C-3-02-1など）を組み立てる
            currentActiveShelf = v1 + "-" + v2 + "-" + v3;
            if (v4 !== "") {
                currentActiveShelf += "-" + v4;
            }

            var imagePath = "images/" + currentActiveShelf + ".png";
            var resultContainer = document.getElementById('resultContainer');
            var resultTitle = document.getElementById('resultTitle');
            var shelfImage = document.getElementById('shelfImage');

            shelfImage.src = imagePath;
            resultTitle.innerText = "検索結果: " + currentActiveShelf;
            resultContainer.style.display = 'block';
            
            document.getElementById('shelfMemo').value = "";
            document.activeElement.blur();

            sendToGoogleForm(currentActiveShelf, "通常検索");

            shelfImage.onerror = function() {
                alert("該当する棚番の画像（" + currentActiveShelf + ".png）が見つかりません。");
                resultContainer.style.display = 'none';
            };
        }

        function submitOrder(actionText) {
            if(!currentActiveShelf) return;
            sendToGoogleForm(currentActiveShelf, actionText);
            alert(currentActiveShelf + " の整理完了を記録しました！");
        }

        function submitMemo() {
            if(!currentActiveShelf) return;
            var memoVal = document.getElementById('shelfMemo').value.trim();
            if(!memoVal) {
                alert("メモが入力されていません。");
                return;
            }
            sendToGoogleForm(currentActiveShelf, "【メモ】 " + memoVal);
            alert("メモを記録しました！");
            document.getElementById('shelfMemo').value = "";
        }
    </script>
</body>
</html>
